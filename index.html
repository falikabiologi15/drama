<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumpulan Drama China</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <h1>Drama China</h1>
        <p>Jelajahi keindahan kisah dari daratan Tiongkok</p>
    </header>

    <nav>
        <button onclick="filterGenre('all')">Semua</button>
        <button onclick="filterGenre('xianxia')">Xianxia</button>
        <button onclick="filterGenre('wuxia')">Wuxia</button>
        <button onclick="filterGenre('republican')">Era Republik</button>
        <button onclick="filterGenre('modern')">Romansa Modern</button>
        <button onclick="filterGenre('school')">Sekolah</button>
        <button onclick="filterGenre('esport')">E-Sport</button>
        <button onclick="filterGenre('history')">Sejarah</button>
    </nav>

    <main id="drama-container">
        </main>

    <section class="actors-section">
        <h2>Aktor Populer</h2>
        <div class="actor-list">
            <div class="actor-card">Xiao Zhan</div>
            <div class="actor-card">Dilraba Dilmurat</div>
            <div class="actor-card">Zhao Lusi</div>
            <div class="actor-card">Yang Yang</div>
            <div class="actor-card">Cheng Yi</div>
            <div class="actor-card">Ju Jingyi</div>
            <div class="actor-card">Liu Yuning</div>
            <div class="actor-card">Zhang Linghe</div>
            <div class="actor-card">Yu Shuxin</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
